<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Korean Study Agent</title>
    <!-- 页面设置 -->
    <style>
        .muted {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <!-- 页面内容 -->
    <h1>Korean Study Agent</h1>
    <p class="muted">第一版：错题分析、推荐复习、生成练习题</p>

    <!-- textarea:多行内容输入框 
    placeholder：默认灰色提升框 -->
    <textarea id="message" placeholder="例如：帮我安排今晚30分钟的韩语复习，并出3道题"></textarea>
    <br />
    <button id="sendBtn">发送</button>

    <div class="card"></div>
</body>

</html>
